function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function num(v){ const n = typeof v==='number'?v:parseFloat(String(v).replace(/\./g,'').replace(',','.')); return isNaN(n)?null:n; }
function numHtml(v){ if(v===''||v==null) return null; const n = typeof v==='number'?v:parseFloat(v); return isNaN(n)?null:n; }
function fmtBRL(v){
  if(v==null || isNaN(v)) return '—';
  return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:2});
}
function fmtNum(v, d){
  if(v==null || isNaN(v)) return '—';
  return v.toLocaleString('pt-BR',{minimumFractionDigits:d==null?2:d, maximumFractionDigits:d==null?2:d});
}
function fmtPct(v, d){
  if(v==null || isNaN(v)) return '—';
  return v.toLocaleString('pt-BR',{minimumFractionDigits:d==null?2:d, maximumFractionDigits:d==null?2:d})+'%';
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDateBR(iso){
  if(!iso) return '—';
  const p = iso.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}
function simpleHash(str){
  let h = 5381;
  for(let i=0;i<str.length;i++){ h = ((h<<5)+h) + str.charCodeAt(i); h = h & h; }
  return 'h'+Math.abs(h).toString(36)+String(str.length);
}

/* ---------------- statistics engine ---------------- */
function transpose(A){ return A[0].map((_,c)=>A.map(r=>r[c])); }
function matmul(A,B){
  const r=A.length, c=B[0].length, inner=B.length;
  const out=Array.from({length:r},()=>Array(c).fill(0));
  for(let i=0;i<r;i++) for(let j=0;j<c;j++){ let s=0; for(let k=0;k<inner;k++) s+=A[i][k]*B[k][j]; out[i][j]=s; }
  return out;
}
function inverse(M){
  const n=M.length;
  const A=M.map((row,i)=>row.concat(Array.from({length:n},(_,j)=>i===j?1:0)));
  for(let i=0;i<n;i++){
    let pivot=A[i][i];
    if(Math.abs(pivot)<1e-10){
      let swap=-1;
      for(let k=i+1;k<n;k++) if(Math.abs(A[k][i])>1e-10){swap=k;break;}
      if(swap===-1) throw new Error('Matriz singular: dados insuficientes ou variáveis redundantes.');
      const tmp=A[i]; A[i]=A[swap]; A[swap]=tmp;
      pivot=A[i][i];
    }
    for(let j=0;j<2*n;j++) A[i][j]/=pivot;
    for(let k=0;k<n;k++){
      if(k===i) continue;
      const f=A[k][i];
      for(let j=0;j<2*n;j++) A[k][j]-=f*A[i][j];
    }
  }
  return A.map(row=>row.slice(n));
}
function logGamma(x){
  const cof=[76.18009172947146,-86.50532032941677,24.01409824083091,-1.231739572450155,0.1208650973866179e-2,-0.5395239384953e-5];
  let y=x, tmp=x+5.5; tmp-=(x+0.5)*Math.log(tmp);
  let ser=1.000000000190015;
  for(let j=0;j<6;j++){ y+=1; ser+=cof[j]/y; }
  return -tmp+Math.log(2.5066282746310005*ser/x);
}
function betacf(x,a,b){
  const MAXIT=200, EPS=3e-7, FPMIN=1e-30;
  let qab=a+b, qap=a+1, qam=a-1;
  let c=1, d=1-qab*x/qap;
  if(Math.abs(d)<FPMIN) d=FPMIN;
  d=1/d; let h=d;
  for(let m=1;m<=MAXIT;m++){
    const m2=2*m;
    let aa=m*(b-m)*x/((qam+m2)*(a+m2));
    d=1+aa*d; if(Math.abs(d)<FPMIN) d=FPMIN;
    c=1+aa/c; if(Math.abs(c)<FPMIN) c=FPMIN;
    d=1/d; h*=d*c;
    aa=-(a+m)*(qab+m)*x/((a+m2)*(qap+m2));
    d=1+aa*d; if(Math.abs(d)<FPMIN) d=FPMIN;
    c=1+aa/c; if(Math.abs(c)<FPMIN) c=FPMIN;
    d=1/d; const del=d*c; h*=del;
    if(Math.abs(del-1)<EPS) break;
  }
  return h;
}
function betai(a,b,x){
  if(x<=0) return 0; if(x>=1) return 1;
  const bt = Math.exp(logGamma(a+b)-logGamma(a)-logGamma(b)+a*Math.log(x)+b*Math.log(1-x));
  if(x < (a+1)/(a+b+2)) return bt*betacf(x,a,b)/a;
  return 1-bt*betacf(1-x,b,a)/b;
}
function tTwoTailedP(t, df){ if(df<=0) return NaN; const x = df/(df+t*t); return betai(df/2,0.5,x)*100; }
function fUpperTailP(f, df1, df2){ if(f<=0 || df1<=0 || df2<=0) return NaN; const x = df2/(df2+df1*f); return betai(df2/2, df1/2, x)*100; }
function tCritical(df, alphaTwoTailedPct){
  let lo=0, hi=50;
  for(let i=0;i<80;i++){
    const mid=(lo+hi)/2;
    const p = tTwoTailedP(mid, df);
    if(p > alphaTwoTailedPct) lo=mid; else hi=mid;
  }
  return (lo+hi)/2;
}

function olsRegression(rows, varIds, depKey){
  const n = rows.length;
  const k = varIds.length;
  const X = rows.map(r=>[1].concat(varIds.map(v=>r.vals[v])));
  const y = rows.map(r=>[r[depKey]]);
  const Xt = transpose(X);
  const XtX = matmul(Xt, X);
  const XtXinv = inverse(XtX);
  const Xty = matmul(Xt, y);
  const beta = matmul(XtXinv, Xty).map(r=>r[0]);
  const yhat = matmul(X, beta.map(b=>[b])).map(r=>r[0]);
  const resid = y.map((yv,i)=>yv[0]-yhat[i]);
  const ybar = y.reduce((a,b)=>a+b[0],0)/n;
  const sse = resid.reduce((a,b)=>a+b*b,0);
  const sst = y.reduce((a,b)=>a+Math.pow(b[0]-ybar,2),0);
  const ssr = sst-sse;
  const r2 = sst!==0 ? ssr/sst : 0;
  const r = Math.sqrt(Math.max(r2,0));
  const dfReg = k, dfRes = n-k-1;
  const msRes = dfRes>0 ? sse/dfRes : NaN;
  const msReg = ssr/dfReg;
  const F = msRes>0 ? msReg/msRes : NaN;
  const seCoef = XtXinv.map((row,i)=>Math.sqrt(Math.max(row[i],0)*msRes));
  const tstats = beta.map((b,i)=>b/seCoef[i]);
  const pvals = tstats.map(t=>tTwoTailedP(t, dfRes));
  const fSig = fUpperTailP(F, dfReg, dfRes);
  const hDiag = X.map(xi=>{
    const xiCol = xi.map(v=>[v]);
    const t1 = matmul([xi], XtXinv);
    const t2 = matmul(t1, xiCol);
    return t2[0][0];
  });
  const sdResid = Math.sqrt(msRes);
  const cooksD = resid.map((e,i)=>{
    const h = Math.min(hDiag[i], 0.999999);
    return (e*e / ((k+1) * msRes)) * (h/Math.pow(1-h,2));
  });
  const stdResid = resid.map(e=> sdResid>0 ? e/sdResid : 0);
  const within1 = stdResid.filter(z=>Math.abs(z)<=1).length/n*100;
  const within164 = stdResid.filter(z=>Math.abs(z)<=1.64).length/n*100;
  const within196 = stdResid.filter(z=>Math.abs(z)<=1.96).length/n*100;
  const outliers = stdResid.filter(z=>Math.abs(z)>2).length;
  return {
    n:n,k:k,beta:beta,r2:r2,r:r,F:F,dfReg:dfReg,dfRes:dfRes,sse:sse,sst:sst,ssr:ssr,msRes:msRes,msReg:msReg,
    seCoef:seCoef,tstats:tstats,pvals:pvals,fSig:fSig,resid:resid,yhat:yhat,hDiag:hDiag,cooksD:cooksD,stdResid:stdResid,
    within1:within1,within164:within164,within196:within196,outliers:outliers
  };
}

function computeVarStats(rows, varIds, varNames, depKey, depLabel){
  const stats = [];
  varIds.forEach(function(vid){
    const vals = rows.map(function(r){return r.vals[vid];}).filter(function(v){return v!=null && !isNaN(v);});
    if(!vals.length) return;
    const min=Math.min.apply(null,vals), max=Math.max.apply(null,vals), mean=vals.reduce(function(a,b){return a+b;},0)/vals.length;
    stats.push({id:vid, nome:varNames[vid]||vid, min:min,max:max,amplitude:max-min,mean:mean});
  });
  const depVals = rows.map(function(r){return r[depKey];}).filter(function(v){return v!=null && !isNaN(v);});
  if(depVals.length){
    const min=Math.min.apply(null,depVals), max=Math.max.apply(null,depVals), mean=depVals.reduce(function(a,b){return a+b;},0)/depVals.length;
    stats.push({id:'__dep__', nome:depLabel, min:min,max:max,amplitude:max-min,mean:mean, dependent:true});
  }
  return stats;
}

/* NBR 14653-2 — grau de fundamentação simplificado */
function grauFundamentacao(p){
  const n=p.n, k=p.k, maxVarSigPct=p.maxVarSigPct, modelSigPct=p.modelSigPct;
  function grauQtd(){
    if(n >= 6*(k+1)) return 3;
    if(n >= 4*(k+1)) return 2;
    if(n >= 3*(k+1)) return 1;
    return 0;
  }
  function grauVarSig(){
    if(maxVarSigPct==null || isNaN(maxVarSigPct)) return 0;
    if(maxVarSigPct <= 10) return 3;
    if(maxVarSigPct <= 20) return 2;
    if(maxVarSigPct <= 30) return 1;
    return 0;
  }
  function grauModelSig(){
    if(modelSigPct==null || isNaN(modelSigPct)) return 0;
    if(modelSigPct <= 1) return 3;
    if(modelSigPct <= 2) return 2;
    if(modelSigPct <= 5) return 1;
    return 0;
  }
  const items = {qtd:grauQtd(), varSig:grauVarSig(), modelSig:grauModelSig()};
  const overall = Math.min(items.qtd, items.varSig, items.modelSig);
  const label = overall===3?'III':overall===2?'II':overall===1?'I':'Não enquadrado';
  return {qtd:items.qtd, varSig:items.varSig, modelSig:items.modelSig, overall:overall, label:label};
}

  const vals = {};
  report.varOrder.forEach(function(v){ vals[v]=null; });
  report.linhas.push({ id: uid(), vals: vals, valor: null });
}

/* ---------------- render router ---------------- */
function render(){
  const root = document.getElementById('root');
  if(state.view === 'auth') root.innerHTML = renderAuth();
  else if(state.view === 'dashboard') root.innerHTML = renderDashboard();
  else if(state.view === 'editor') root.innerHTML = renderEditor();
  window.scrollTo(0,0);
}

function renderTopError(){
  let html = '';
  if(state.error) html += '<div class="banner banner-error">'+escapeHtml(state.error)+'</div>';
  if(state.notice) html += '<div class="banner banner-notice">'+escapeHtml(state.notice)+'</div>';
  return html;
}

/* ---------------- EDITOR VIEW ---------------- */
const TABS = [
  {id:'basico', label:'1 · Dados básicos'},
  {id:'dados', label:'2 · Amostra & resultados'},
  {id:'avaliando', label:'3 · Imóvel avaliando'},
  {id:'preview', label:'4 · Relatório'},
];

function renderEditor(){
  const r = state.currentReport;
  return `
  <div style="min-height:100vh;">
    <header class="no-print" style="border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:5;">
      <div style="max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="btn btn-ghost btn-sm" onclick="handleBackToDashboard()">← Painel</button>
          <div style="font-family:var(--font-display);font-size:16px;font-weight:600;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
            ${escapeHtml(r.basico.modelo || 'Novo laudo')}
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="handleSaveReport()" ${state.busy?'disabled':''}>${state.busy?'Salvando…':'Salvar'}</button>
          <button class="btn btn-accent btn-sm" onclick="setEditorTab('preview')">Ver relatório →</button>
        </div>
      </div>
      <div style="max-width:1080px;margin:0 auto;padding:0 24px;display:flex;gap:4px;overflow-x:auto;">
        ${TABS.map(function(t){
          const active = state.editorTab===t.id;
          return `<button class="btn-sm" style="border:none;background:none;padding:10px 14px;font-weight:600;font-size:13px;color:${active?'var(--accent-dark)':'var(--ink-soft)'};border-bottom:2.5px solid ${active?'var(--accent)':'transparent'};border-radius:0;white-space:nowrap;" onclick="setEditorTab('${t.id}')">${t.label}</button>`;
        }).join('')}
      </div>
    </header>
    <main style="max-width:1080px;margin:0 auto;padding:28px 24px 100px;">
      ${renderTopError()}
      ${state.editorTab==='basico' ? renderTabBasico(r) : ''}
      ${state.editorTab==='dados' ? renderTabDados(r) : ''}
      ${state.editorTab==='avaliando' ? renderTabAvaliando(r) : ''}
      ${state.editorTab==='preview' ? renderTabPreview(r) : ''}
    </main>
  </div>`;
}

function renderTabBasico(r){
  return `
  <div class="card" style="padding:28px;max-width:640px;">
    <div class="eyebrow" style="margin-bottom:4px;">Informações básicas</div>
    <h2 style="font-family:var(--font-display);font-size:20px;margin:2px 0 20px;font-weight:600;">Sobre este laudo</h2>
    <div class="field">
      <label>Nome do modelo / título do laudo</label>
      <input type="text" value="${escapeHtml(r.basico.modelo)}" placeholder="Ex: Apartamentos — Bairro Praia, 2024" onchange="updateBasico('modelo', this.value)" />
    </div>
    <div class="field-row">
      <div class="field">
        <label>Autor</label>
        <input type="text" value="${escapeHtml(r.basico.autor)}" onchange="updateBasico('autor', this.value)" />
      </div>
      <div class="field">
        <label>Data do modelo</label>
        <input type="date" value="${escapeHtml(r.basico.data)}" onchange="updateBasico('data', this.value)" />
      </div>
    </div>
    <div class="field">
      <label>Tipologia</label>
      <select onchange="updateBasico('tipologia', this.value)">
        ${['Apartamentos','Casas','Terrenos','Salas comerciais','Galpões','Lojas','Rural'].map(function(o){
          return `<option value="${o}" ${r.basico.tipologia===o?'selected':''}>${o}</option>`;
        }).join('')}
      </select>
    </div>
    <div class="field">
      <label>Nome da variável dependente</label>
      <input type="text" value="${escapeHtml(r.depLabel)}" onchange="updateDepLabel(this.value)" />
      <div class="hint">Geralmente "Valor unitário" ou "Valor total".</div>
    </div>
    <div class="field" style="margin-bottom:0;">
      <label>Modo de preenchimento dos resultados</label>
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button class="btn ${r.modo==='auto'?'btn-accent':'btn-ghost'}" style="flex:1;" onclick="setModo('auto')">Calcular a partir dos dados</button>
        <button class="btn ${r.modo==='manual'?'btn-accent':'btn-ghost'}" style="flex:1;" onclick="setModo('manual')">Já tenho os resultados</button>
      </div>
      <div class="hint">${r.modo==='auto' ? 'Você lança a amostra de imóveis e o Aferi calcula a regressão, os testes e a estimativa.' : 'Você digita coeficientes, R², F e significâncias já calculados em outro software.'}</div>
    </div>
  </div>`;
}

function renderTabDados(r){
  if(r.modo==='manual') return renderTabDadosManual(r);
  return renderTabDadosAuto(r);
}

function renderTabDadosAuto(r){
  const varOrder = r.varOrder;
  return `
  <div class="card" style="padding:28px;margin-bottom:20px;">
    <div class="eyebrow" style="margin-bottom:4px;">Variáveis independentes</div>
    <h2 style="font-family:var(--font-display);font-size:20px;margin:2px 0 16px;font-weight:600;">Quais variáveis explicam o valor?</h2>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;">
      ${varOrder.map(function(vid){
        return `<div style="display:flex;align-items:center;gap:6px;background:var(--surface-alt);border:1px solid var(--line);border-radius:var(--radius-s);padding:6px 6px 6px 12px;">
          <input type="text" value="${escapeHtml(r.varNames[vid])}" onchange="renameVar('${vid}', this.value)" style="border:none;background:transparent;font-size:13.5px;font-weight:600;width:150px;outline:none;" />
          ${varOrder.length>1 ? `<button class="btn btn-ghost btn-sm" style="padding:3px 8px;border:none;color:var(--danger);" onclick="removeVar('${vid}')" title="Remover variável">✕</button>` : ''}
        </div>`;
      }).join('')}
      ${varOrder.length<6 ? `<button class="btn btn-ghost btn-sm" onclick="addVar()">+ Variável</button>` : ''}
    </div>
    <div class="hint">Até 6 variáveis independentes (ex: área privativa, quartos, vagas, distância do mar).</div>
  </div>

  <div class="card" style="padding:28px;">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
      <div>
        <div class="eyebrow" style="margin-bottom:4px;">Amostra de mercado</div>
        <h2 style="font-family:var(--font-display);font-size:20px;margin:2px 0 0;font-weight:600;">Dados coletados</h2>
      </div>
      <button class="btn btn-accent" onclick="handleCalcRegression()">Calcular regressão</button>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead><tr>
          <th style="width:32px;">#</th>
          ${varOrder.map(function(vid){ return `<th class="num">${escapeHtml(r.varNames[vid])}</th>`; }).join('')}
          <th class="num">${escapeHtml(r.depLabel)}</th>
          <th style="width:36px;"></th>
        </tr></thead>
        <tbody>
          ${r.linhas.map(function(row,i){
            return `<tr>
              <td style="color:var(--ink-faint);font-family:var(--font-mono);">${i+1}</td>
              ${varOrder.map(function(vid){
                return `<td class="num"><input type="number" step="any" value="${row.vals[vid]==null?'':row.vals[vid]}" style="width:100px;border:1px solid var(--line);border-radius:4px;padding:5px 7px;text-align:right;font-family:var(--font-mono);font-size:13px;" onchange="setCell('${row.id}','${vid}', this.value)" /></td>`;
              }).join('')}
              <td class="num"><input type="number" step="any" value="${row.valor==null?'':row.valor}" style="width:120px;border:1px solid var(--line);border-radius:4px;padding:5px 7px;text-align:right;font-family:var(--font-mono);font-size:13px;font-weight:600;" onchange="setDep('${row.id}', this.value)" /></td>
              <td><button class="btn btn-ghost btn-sm" style="border:none;color:var(--danger);padding:4px 6px;" onclick="removeRow('${row.id}')">✕</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div style="margin-top:14px;display:flex;gap:10px;align-items:center;">
      <button class="btn btn-ghost btn-sm" onclick="handleAddRow()">+ Imóvel da amostra</button>
      <span style="font-size:12.5px;color:var(--ink-faint);">${r.linhas.length} dado(s) · mínimo recomendado: ${3*(varOrder.length+1)} (NBR Grau I)</span>
    </div>
    ${r.calc ? renderCalcSummary(r) : `<div class="hint" style="margin-top:14px;">Preencha a amostra e clique em "Calcular regressão" para gerar coeficientes, R² e testes de significância.</div>`}
  </div>`;
}

function renderCalcSummary(r){
  const c = r.calc;
  return `
  <div style="margin-top:22px;padding-top:20px;border-top:1px dashed var(--line-strong);">
    <div class="eyebrow" style="margin-bottom:10px;">Resultado do cálculo</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;">
      <div class="card" style="padding:14px;box-shadow:none;background:var(--surface-alt);">
        <div style="font-size:11px;color:var(--ink-soft);font-family:var(--font-mono);text-transform:uppercase;">Correlação (R)</div>
        <div style="font-family:var(--font-mono);font-size:18px;font-weight:600;">${fmtNum(c.r,4)}</div>
      </div>
      <div class="card" style="padding:14px;box-shadow:none;background:var(--surface-alt);">
        <div style="font-size:11px;color:var(--ink-soft);font-family:var(--font-mono);text-transform:uppercase;">Determinação (R²)</div>
        <div style="font-family:var(--font-mono);font-size:18px;font-weight:600;">${fmtNum(c.r2,4)}</div>
      </div>
      <div class="card" style="padding:14px;box-shadow:none;background:var(--surface-alt);">
        <div style="font-size:11px;color:var(--ink-soft);font-family:var(--font-mono);text-transform:uppercase;">F de Snedecor</div>
        <div style="font-family:var(--font-mono);font-size:18px;font-weight:600;">${fmtNum(c.F,2)}</div>
      </div>
      <div class="card" style="padding:14px;box-shadow:none;background:var(--surface-alt);">
        <div style="font-size:11px;color:var(--ink-soft);font-family:var(--font-mono);text-transform:uppercase;">Signif. do modelo</div>
        <div style="font-family:var(--font-mono);font-size:18px;font-weight:600;">${fmtPct(c.fSig,2)}</div>
      </div>
    </div>
    <table style="margin-top:16px;">
      <thead><tr><th>Variável</th><th class="num">Coeficiente</th><th class="num">t observado</th><th class="num">Signif. (%)</th></tr></thead>
      <tbody>
        <tr><td>Intercepto</td><td class="num">${fmtNum(c.beta[0],2)}</td><td class="num">${fmtNum(c.tstats[0],2)}</td><td class="num">${fmtPct(c.pvals[0],2)}</td></tr>
        ${r.varOrder.map(function(vid,i){
          return `<tr><td>${escapeHtml(r.varNames[vid])}</td><td class="num">${fmtNum(c.beta[i+1],4)}</td><td class="num">${fmtNum(c.tstats[i+1],2)}</td><td class="num">${fmtPct(c.pvals[i+1],2)}</td></tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="hint" style="margin-top:10px;">Distância ao quadrado explicada: os testes usam distribuição t de Student e F de Snedecor exatas (mesma base estatística de laudos NBR 14653-2).</div>
  </div>`;
}

function renderTabDadosManual(r){
  const m = r.manual;
  return `
  <div class="card" style="padding:28px;margin-bottom:20px;">
    <div class="eyebrow" style="margin-bottom:4px;">Resultados do modelo</div>
    <h2 style="font-family:var(--font-display);font-size:20px;margin:2px 0 16px;font-weight:600;">Digite os resultados já calculados</h2>
    <div class="field-row">
      <div class="field"><label>Coeficiente de correlação (R)</label><input type="text" inputmode="decimal" value="${escapeHtml(m.r)}" onchange="setManualField('r', this.value)" placeholder="Ex: 0,9303" /></div>
      <div class="field"><label>Coeficiente de determinação (R²)</label><input type="text" inputmode="decimal" value="${escapeHtml(m.r2)}" onchange="setManualField('r2', this.value)" placeholder="Ex: 0,8655" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Estatística F (Fisher-Snedecor)</label><input type="text" inputmode="decimal" value="${escapeHtml(m.fisher)}" onchange="setManualField('fisher', this.value)" placeholder="Ex: 43,44" /></div>
      <div class="field"><label>Significância do modelo (%)</label><input type="text" inputmode="decimal" value="${escapeHtml(m.sigModelo)}" onchange="setManualField('sigModelo', this.value)" placeholder="Ex: 0,00" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Nº de dados utilizados (n)</label><input type="text" inputmode="numeric" value="${escapeHtml(m.n)}" onchange="setManualField('n', this.value)" placeholder="Ex: 32" /></div>
      <div class="field"><label>Nº de variáveis independentes (k)</label><input type="text" inputmode="numeric" value="${escapeHtml(m.k)}" onchange="setManualField('k', this.value)" placeholder="Ex: 4" /></div>
    </div>
    <div class="field">
      <label>Equação de regressão (texto livre, para exibição no relatório)</label>
      <textarea rows="2" onchange="setManualField('equacaoTexto', this.value)" placeholder="Ex: Valor unitário = 692.222,78 + 78.973,96 * Quartos + ...">${escapeHtml(m.equacaoTexto)}</textarea>

    <div class="field">
      <label>Intercepto (para cálculo da estimativa)</label>
      <input type="text" inputmode="decimal" value="${escapeHtml(m.intercepto)}" onchange="setManualField('intercepto', this.value)" placeholder="Ex: 692222,78" />
    </div>

  <div class="card" style="padding:28px;">

    <table>
      <thead><tr><th>Variável</th><th class="num">Coeficiente</th><th class="num">t observado</th><th class="num">Signif. (%)</th><th style="width:36px;"></th></tr></thead>

        ${m.coefs.map(function(c,i){

function activeVarList(r){
  if(r.modo==='auto') return r.varOrder.map(function(vid){ return {id:vid, nome:r.varNames[vid]}; });
  return r.manual.coefs.map(function(c){ return {id:c.id, nome:c.nome}; });
}

function estimateForReport(r){
  const vars = activeVarList(r);
  if(r.modo==='auto'){
    if(!r.calc) return null;
    let est = r.calc.beta[0];
    let ok = true;
    let x0 = [1];
    vars.forEach(function(v,i){
      const val = num(r.avaliando[v.id]);
      if(val==null) ok=false; else est += r.calc.beta[i+1]*val;
      x0.push(val==null?0:val);
    });
    if(!ok) return null;
    let margin = null;
    try{
      const XtXinv = inverse(matmul(transpose(r.linhas.map(function(row){ return [1].concat(r.varOrder.map(function(v){return row.vals[v];})); })), r.linhas.map(function(row){ return [1].concat(r.varOrder.map(function(v){return row.vals[v];})); })));
      const t1 = matmul([x0], XtXinv);
      const t2 = matmul(t1, x0.map(function(v){return [v];}))[0][0];
      const sePred = Math.sqrt(Math.max(r.calc.msRes*(1+t2),0));
      const tc = tCritical(r.calc.dfRes, 20); // 80% confidence, two-tailed alpha 20%
      margin = tc*sePred;
    }catch(e){ margin=null; }
    return {valor:est, margin:margin};
  } else {
    const inter = num(r.manual.intercepto);
    if(inter==null) return null;
    let est = inter, ok=true;
    r.manual.coefs.forEach(function(c){
      const coef = num(c.coef); const val = num(r.avaliando[c.id]);
      if(coef==null || val==null) ok=false; else est += coef*val;
    });
    if(!ok) return null;
    return {valor:est, margin:null};
  }
}

function adherenceSvg(r){
  if(r.modo!=='auto' || !r.calc) return '';
  const obs = r.linhas.map(function(row){return row.valor;});
  const est = r.calc.yhat;
  const allVals = obs.concat(est);
  const min = Math.min.apply(null, allVals), max = Math.max.apply(null, allVals);
  const pad = (max-min)*0.08 || 1;
  const lo = min-pad, hi = max+pad;
  const W=460, H=300, M=48;
  function sx(v){ return M + (v-lo)/(hi-lo)*(W-2*M); }
  function sy(v){ return H-M - (v-lo)/(hi-lo)*(H-2*M); }
  const pts = obs.map(function(o,i){ return {x:sx(o), y:sy(est[i])}; });
  const dots = pts.map(function(p){ return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="none" stroke="#2F6F5E" stroke-width="1.6"/>`; }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:460px;">
    <line x1="${M}" y1="${H-M}" x2="${W-M}" y2="${H-M}" stroke="#17262B" stroke-width="1"/>
    <line x1="${M}" y1="${M}" x2="${M}" y2="${H-M}" stroke="#17262B" stroke-width="1"/>
    <line x1="${sx(lo)}" y1="${sy(lo)}" x2="${sx(hi)}" y2="${sy(hi)}" stroke="#A85B2E" stroke-width="1.3" stroke-dasharray="4 3"/>
    ${dots}
    <text x="${W/2}" y="${H-10}" font-size="10" fill="#56655F" text-anchor="middle" font-family="IBM Plex Mono, monospace">Observado</text>
    <text x="14" y="${H/2}" font-size="10" fill="#56655F" text-anchor="middle" font-family="IBM Plex Mono, monospace" transform="rotate(-90 14 ${H/2})">Estimado</text>
  </svg>`;
}

/* ---------------- HANDLERS ---------------- */
function switchAuthMode(){
  state.authMode = state.authMode==='login' ? 'register' : 'login';
  state.error = null;
  render();
}

async function handleRegister(){
  const name = (document.getElementById('f_name')||{}).value || '';
  const username = ((document.getElementById('f_user')||{}).value || '').trim().toLowerCase();
  const pass = (document.getElementById('f_pass')||{}).value || '';
  state.error = null;
  state.lastUsername = username;
  const sb = getSupabase();
  if(!sb){ state.error='O app ainda não foi configurado com um projeto Supabase (veja os comentários no topo do arquivo).'; render(); return; }
  if(!name.trim()) { state.error='Informe seu nome.'; render(); return; }
  if(!/^[a-z0-9._-]{3,24}$/.test(username)){ state.error='Usuário deve ter 3–24 caracteres (letras, números, ., _ ou -).'; render(); return; }
  if(pass.length<6){ state.error='Senha muito curta (mínimo 6 caracteres).'; render(); return; }
  state.busy = true; render();
  try{
    const { data, error } = await sb.auth.signUp({
      email: usernameToEmail(username),
      password: pass,
      options: { data: { name: name.trim(), username: username } },
    });
    if(error){ console.error('Aferi: signUp error', error); state.error = translateAuthError(error.message); state.busy=false; render(); return; }
    if(!data.session){
      state.busy = false;
      state.notice = 'Conta criada, mas o login automático não veio — verifique se "Confirm email" está desativado nas configurações de Authentication do Supabase, depois entre normalmente.';
      state.authMode = 'login';
      render();
      return;
    }
    state.user = { id: data.user.id, username: username, name: name.trim() };
    state.busy = false;
    await enterDashboard();
  }catch(e){
    console.error('Aferi: handleRegister failed', e);
    state.busy=false; state.error='Não foi possível criar a conta agora. [detalhe técnico: '+(e&&e.message||e)+']'; render();
  }
}

async function handleLogin(){
  const username = ((document.getElementById('f_user')||{}).value || '').trim().toLowerCase();
  const pass = (document.getElementById('f_pass')||{}).value || '';
  state.error = null;
  state.lastUsername = username;
  const sb = getSupabase();
  if(!sb){ state.error='O app ainda não foi configurado com um projeto Supabase (veja os comentários no topo do arquivo).'; render(); return; }
  if(!username || !pass){ state.error='Preencha usuário e senha.'; render(); return; }
  state.busy = true; render();
  try{
    const { data, error } = await sb.auth.signInWithPassword({ email: usernameToEmail(username), password: pass });
    if(error){ console.error('Aferi: signIn error', error); state.error = translateAuthError(error.message); state.busy=false; render(); return; }
    const meta = data.user.user_metadata || {};
    state.user = { id: data.user.id, username: meta.username || username, name: meta.name || username };
    state.busy = false;
    await enterDashboard();
  }catch(e){
    console.error('Aferi: handleLogin failed', e);
    state.busy=false; state.error='Não foi possível entrar agora. [detalhe técnico: '+(e&&e.message||e)+']'; render();
  }
}

async function handleLogout(){
  const sb = getSupabase();
  try{ if(sb) await sb.auth.signOut(); }catch(e){}
  state.user = null; state.view='auth'; state.authMode='login'; state.reports=[]; state.error=null; state.notice=null; state.lastUsername=null;
  render();
}

async function tryRestoreSession(){
  const sb = getSupabase();
  if(!sb) return;
  try{
    const { data } = await sb.auth.getSession();
    if(data && data.session && data.session.user){
      const u = data.session.user;
      const meta = u.user_metadata || {};
      state.user = { id: u.id, username: meta.username || (u.email||'').split('@')[0], name: meta.name || meta.username || 'Usuário' };
      await enterDashboard();
    }
  }catch(e){ console.error('Aferi: tryRestoreSession failed', e); }
}

async function enterDashboard(){
  state.view = 'dashboard';
  state.error = null;
  await refreshReports();
}

async function refreshReports(){
  state.reportsLoading = true; render();
  const keys = await listReportKeys(state.user.id);
  const items = [];
  for(const key of keys){
    const rep = await loadReportByKey(key);
    if(rep) items.push({key:key, report:rep});
  }
  items.sort(function(a,b){ return (b.report.updatedAt||'').localeCompare(a.report.updatedAt||''); });
  state.reports = items;
  state.reportsLoading = false;
  render();
}

function handleNewReport(){
  state.currentReport = blankReport(state.user.id);
  state.currentKey = null;
  state.editorTab = 'basico';
  state.error = null;
  state.view = 'editor';
  render();
}

async function handleOpenReport(key){
  state.error=null;
  const rep = await loadReportByKey(key);
  if(!rep){ state.error='Não foi possível abrir esse laudo.'; render(); return; }
  state.currentReport = rep;
  state.currentKey = key;
  state.editorTab = 'basico';
  state.view = 'editor';
  render();
}

async function handleDuplicateReport(key){
  const rep = await loadReportByKey(key);
  if(!rep) return;
  const copy = JSON.parse(JSON.stringify(rep));
  copy.id = uid();
  copy.basico.modelo = (copy.basico.modelo||'Laudo') + ' (cópia)';
  copy.updatedAt = new Date().toISOString();
  try{ await saveReportObj(copy); }catch(e){ console.error('Aferi: duplicate failed', e); state.error='Não foi possível duplicar.'; render(); return; }
  await refreshReports();
}

async function handleDeleteReport(key){
  if(!confirm('Excluir este laudo? Essa ação não pode ser desfeita.')) return;
  await deleteReportByKey(key);
  await refreshReports();
}

function handleBackToDashboard(){
  state.view = 'dashboard';
  state.currentReport = null;
  state.currentKey = null;
  refreshReports();
}

async function handleSaveReport(){
  state.busy = true; render();
  try{
    state.currentReport.updatedAt = new Date().toISOString();
    if(state.currentReport.modo==='auto' && state.currentReport.calc){
      state.currentReport.calc.estimativa = estimateForReport(state.currentReport);
    } else {
      state.currentReport.manualEstimate = (estimateForReport(state.currentReport)||{}).valor;
    }
    const key = await saveReportObj(state.currentReport);
    state.currentKey = key;
    state.notice = 'Laudo salvo.';
    state.busy = false;
    render();
    setTimeout(function(){ state.notice=null; render(); }, 2500);
  }catch(e){
    console.error('Aferi: handleSaveReport failed', e);
    state.busy=false; state.error='Não foi possível salvar agora.'; render();
  }
}

function setEditorTab(tab){ state.editorTab = tab; state.error=null; render(); }


function updateBasico(field, value){ state.currentReport.basico[field] = value; render(); }
function updateDepLabel(value){ state.currentReport.depLabel = value; render(); }
function setModo(mode){ state.currentReport.modo = mode; render(); }

function addVar(){
  const r = state.currentReport;
  if(r.varOrder.length>=6) return;
  const id = uid();
  r.varNames[id] = 'Nova variável';
  r.varOrder.push(id);
  r.linhas.forEach(function(row){ row.vals[id]=null; });
  render();
}
function removeVar(id){
  const r = state.currentReport;
  r.varOrder = r.varOrder.filter(function(v){return v!==id;});
  delete r.varNames[id];
  r.linhas.forEach(function(row){ delete row.vals[id]; });
  delete r.avaliando[id];
  r.calc = null;
  render();
}
function renameVar(id, value){
  state.currentReport.varNames[id] = value;
  state.currentReport.calc = null;
  render();
}

function handleAddRow(){ addRow(state.currentReport); render(); }
function removeRow(id){
  const r = state.currentReport;
  r.linhas = r.linhas.filter(function(row){return row.id!==id;});
  r.calc = null;
  render();
}
function setCell(rowId, varId, value){
  const row = state.currentReport.linhas.find(function(r){return r.id===rowId;});
  if(row) row.vals[varId] = numHtml(value);
  state.currentReport.calc = null;
  render();
}
function setDep(rowId, value){
  const row = state.currentReport.linhas.find(function(r){return r.id===rowId;});
  if(row) row.valor = numHtml(value);
  state.currentReport.calc = null;
  render();
}

function handleCalcRegression(){
  const r = state.currentReport;
  state.error = null;
  const varIds = r.varOrder;
  const rows = r.linhas.filter(function(row){
    if(row.valor==null) return false;
    return varIds.every(function(v){ return row.vals[v]!=null; });
  });
  const minNeeded = varIds.length+2;
  if(rows.length < minNeeded){
    state.error = 'Dados insuficientes: preencha ao menos '+minNeeded+' linhas completas (todas as variáveis + valor) para calcular com '+varIds.length+' variável(is).';
    render(); return;
  }
  try{
    r.calc = olsRegression(rows, varIds, 'valor');
    state.notice = 'Regressão calculada com '+rows.length+' dado(s).';
  }catch(e){
    state.error = e.message || 'Não foi possível calcular a regressão com esses dados.';
    r.calc = null;
  }
  render();
  if(state.notice){ setTimeout(function(){ state.notice=null; render(); }, 2500); }
}

function setManualField(field, value){ state.currentReport.manual[field] = value; render(); }
function setManualCoef(id, field, value){
  const c = state.currentReport.manual.coefs.find(function(x){return x.id===id;});
  if(c) c[field] = value;
  render();
}
function addManualVar(){
  const r = state.currentReport;
  if(r.manual.coefs.length>=6) return;
  r.manual.coefs.push({id:uid(), nome:'Nova variável', coef:'', tObs:'', sig:''});
  render();
}
function removeManualVar(id){
  const r = state.currentReport;
  r.manual.coefs = r.manual.coefs.filter(function(c){return c.id!==id;});
  delete r.avaliando[id];
  render();
}

function setAvaliando(varId, value){
  state.currentReport.avaliando[varId] = numHtml(value);
  render();
}

/* ---------------- init ---------------- */
window.state = state; // exposed for debugging
render();
tryRestoreSession();
</script>
</body>
</html>
